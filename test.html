<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네이버 지도 인증 테스트</title>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=p92c8gq59k"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        h1 {
            text-align: center;
            font-size: 20px;
            margin: 20px 0;
        }
        #map {
            width: 100%;
            height: 500px;
            background: #eee;
        }
    </style>
</head>
<body>
    <h1>지도 인증 테스트 중...</h1>
    <div id="map"></div>

    <script>
        const center = new naver.maps.LatLng(35.1381, 129.0621);

        const map = new naver.maps.Map('map', {
            center: center,
            zoom: 16
        });

        new naver.maps.Marker({
            position: center,
            map: map
        });

        console.log('지도 생성 성공');
    </script>
</body>
</html>
