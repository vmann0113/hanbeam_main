<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>한빔한복 공식 홈페이지 - 전국 11개 지점 네트워크</title>
<style>
    :root { 
        --hb-navy: #1A3A5F; 
        --hb-gold: #B8977E;
        --hb-gray: #F8F5F2;
    }
    body { margin: 0; font-family: 'Pretendard', sans-serif; color: #333; background: #fff; line-height: 1.6; word-break: keep-all; }
    
    /* 1. 통합 히어로: 브랜드 규모감 강조 */
    .hero { 
        height: 65vh; background: var(--hb-navy); 
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        color: #fff; text-align: center; padding: 20px;
    }
    .hero .logo-top { font-size: 1rem; letter-spacing: 0.4em; margin-bottom: 15px; opacity: 0.7; }
    .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin: 0; font-weight: 700; }
    .hero h1 b { color: var(--hb-gold); }
    .hero .network-count { margin-top: 20px; font-size: 1.2rem; background: rgba(255,255,255,0.1); padding: 10px 25px; border-radius: 50px; border: 1px solid var(--hb-gold); }

    /* 2. 전지점 안내 섹션 (핵심) */
    .branch-section { padding: 80px 20px; max-width: 1200px; margin: 0 auto; }
    .section-header { text-align: center; margin-bottom: 50px; }
    .section-header h2 { font-size: 2rem; color: var(--hb-navy); margin-bottom: 10px; }
    .section-header p { color: #888; }

    /* 지점 그리드 UI */
    .branch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .branch-card { 
        border: 1px solid #eee; border-radius: 12px; padding: 25px; 
        background: #fff; transition: all 0.3s ease; cursor: pointer;
        display: flex; flex-direction: column; justify-content: space-between;
    }
    .branch-card:hover { border-color: var(--hb-gold); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .branch-card h3 { margin: 0 0 10px 0; font-size: 1.3rem; color: var(--hb-navy); display: flex; align-items: center; gap: 8px; }
    .branch-card h3::before { content: '●'; color: var(--hb-gold); font-size: 0.8rem; }
    .branch-card .addr { font-size: 0.9rem; color: #777; margin-bottom: 20px; min-height: 45px; }
    
    .branch-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .mini-btn { padding: 10px; text-align: center; border-radius: 6px; font-size: 0.85rem; font-weight: 600; text-decoration: none; }
    .btn-kakao { background: #FEE500; color: #3C1E1E; }
    .btn-res { background: #03C75A; color: #fff; }

    /* 3. 본점(부산) 프라이드 섹션 */
    .main-hq { background: var(--hb-gray); padding: 80px 20px; text-align: center; }
    .hq-content { max-width: 800px; margin: 0 auto; }
    .hq-tag { color: var(--hb-gold); font-weight: 700; letter-spacing: 2px; }

    /* 4. 플로팅 예약 바 */
    .cta-fixed { 
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        width: 90%; max-width: 500px; background: var(--hb-navy); color: #fff;
        padding: 15px 25px; border-radius: 50px; display: flex; justify-content: space-between;
        align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 2000;
    }
    .cta-fixed span { font-weight: 600; }
    .cta-fixed a { background: var(--hb-gold); color: #fff; padding: 8px 20px; border-radius: 25px; font-size: 0.9rem; font-weight: 700; text-decoration: none; }

    @media (max-width: 768px) {
        .branch-grid { grid-template-columns: 1fr; }
        .hero h1 { font-size: 2.2rem; }
    }
</style>
</head>
<body>

<section class="hero">
    <div class="logo-top">HANBEAM HANBOK</div>
    <h1>전통을 짓다, <b>전국을 잇다</b></h1>
    <div class="network-count">대한민국 NO.1 네트워크 <b>11개 지점</b></div>
</section>

<section class="main-hq">
    <div class="hq-content">
        <div class="hq-tag">HEADQUARTER</div>
        <h2 style="font-size: 2rem; margin: 15px 0;">한빔한복 부산 본점</h2>
        <p>부산 범일동에서 시작된 한빔의 장인정신은 이제 전국 11개 지점에서 동일한 고품격 서비스로 이어집니다. 본점은 전 지점의 디자인과 품질을 총괄하는 컨트롤 타워입니다.</p>
    </div>
</section>

<section class="branch-section">
    <div class="section-header">
        <h2>지점 안내</h2>
        <p>가까운 한빔한복 매장에서 직접 피팅해보세요.</p>
    </div>

    <div class="branch-grid" id="branchGrid">
        </div>
</section>

<div style="height: 100px;"></div>

<div class="cta-fixed">
    <span>가까운 지점을 찾으시나요?</span>
    <a href="#branchGrid">지점찾기</a>
</div>

<script>
    const branches = [
        {name:"부산본점", addr:"부산 동구 조방로 123", res:"https://m.booking.naver.com/booking/6/bizes/661812", kakao:"https://open.kakao.com/o/soq7Ns4d"},
        {name:"센텀점", addr:"부산 해운대구 센텀중앙로", res:"https://booking.naver.com/booking/6/bizes/1577219", kakao:"#"},
        {name:"인천점", addr:"인천 남동구 인하로", res:"https://m.booking.naver.com/booking/13/bizes/1039475", kakao:"https://open.kakao.com/o/sIrXajUf"},
        {name:"대구점", addr:"대구 중구 달구벌대로", res:"https://m.place.naver.com/place/2043617700/ticket", kakao:"#"},
        {name:"창원점", addr:"경남 창원시 성산구", res:"https://booking.naver.com/booking/6/bizes/843111", kakao:"https://open.kakao.com/o/sdcvbh5e"},
        {name:"울산점", addr:"울산 남구 삼산로", res:"https://booking.naver.com/booking/6/bizes/1534767", kakao:"https://open.kakao.com/o/sKjCbA0h"},
        {name:"김해점", addr:"경남 김해시 김해대로", res:"https://booking.naver.com/booking/6/bizes/1402679", kakao:"https://open.kakao.com/o/sHM2wwsh"},
        {name:"양산점", addr:"경남 양산시 물금읍", res:"https://booking.naver.com/booking/13/bizes/868629", kakao:"https://open.kakao.com/o/sp44Hxaf"},
        {name:"진주점", addr:"경남 진주시 강남로", res:"https://m.booking.naver.com/booking/6/bizes/1485854", kakao:"https://open.kakao.com/o/sbxBToNh"},
        {name:"안산점", addr:"경기 안산시 단원구", res:"https://m.booking.naver.com/booking/6/bizes/1500008", kakao:"https://open.kakao.com/o/sqRSjaRh"},
        {name:"마산점", addr:"경남 창원시 마산회원구", res:"https://booking.naver.com/booking/6/bizes/1526541", kakao:"https://open.kakao.com/o/ssWvuvYh"}
    ];

    const grid = document.getElementById('branchGrid');
    branches.forEach(b => {
        grid.innerHTML += `
            <div class="branch-card">
                <div>
                    <h3>${b.name}</h3>
                    <p class="addr">${b.addr}</p>
                </div>
                <div class="branch-btns">
                    <a href="${b.kakao}" class="mini-btn btn-kakao" target="_blank">카톡</a>
                    <a href="${b.res}" class="mini-btn btn-res" target="_blank">예약</a>
                </div>
            </div>
        `;
    });
</script>

</body>
</html>
