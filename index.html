<!doctype html>
<html lang="ko"> 
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>한빔한복 공식 홈페이지</title>

    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=p92c8gq59k"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    
    <style>
        :root { --hb-navy: #0A1D37; --hb-gold: #B8977E; --hb-bg: #F9F7F5; --hb-navy-light: #1A3A5F; }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: #fff; color: #333; overflow-x: hidden; width: 100%; }

        /* 1. Hero */
        .hero { height: 100vh; background: linear-gradient(135deg, var(--hb-navy), var(--hb-navy-light), var(--hb-navy)); color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; overflow: hidden; padding: 20px; }
        .logo-area { width: 90%; max-width: 450px; margin: 0 auto 30px; }
        .logo-area img { width: 100%; height: auto; display: block; }
        .hero h1 { font-size: clamp(1.8rem, 5vw, 4.5rem); font-weight: 200; margin: 0; line-height: 1.2; }
        .hero h1 b { font-weight: 700; color: var(--hb-gold); }
        .hero .sub-text { margin-top: 20px; font-size: 0.9rem; opacity: 0.6; letter-spacing: 2px; }

        /* 2. Video & Main Store */
        .video-sec { width: 100%; height: auto; aspect-ratio: 16 / 9; background: #000; overflow: hidden; }
        .video-sec video { width: 100%; height: 100%; object-fit: cover; }
        
        .main-store { padding: 80px 20px; background: var(--hb-bg); text-align: center; }
        .hq-slideshow { width: 100%; max-width: 1200px; aspect-ratio: 16 / 9; margin: 0 auto 40px; position: relative; border-radius: 4px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .hq-slideshow img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity: 0; transition: opacity 2s ease-in-out; }
        .hq-slideshow img.active { opacity: 1; }
        
        .pc-hide { display: none; }

        /* 3. Lookbook - 터치 조작 최적화 추가 */
        .lookbook-sec { padding: 80px 0; background: #fff; text-align: center; }
        .tab-btn { padding: 12px 30px; border: 2px solid var(--hb-gold); background: #fff; color: var(--hb-gold); cursor: pointer; font-weight: 700; border-radius: 50px; margin: 5px; font-size: 1rem; transition: 0.3s; }
        .tab-btn.active { background: var(--hb-gold); color: #fff; }
        
        .album-viewport { 
            margin: 30px auto; width: 90%; max-width: 850px; height: 850px; 
            display: flex; justify-content: center; align-items: center;
            touch-action: pan-y; /* 🏆 좌우 드래그는 앨범에, 상하 스크롤은 페이지에 양보 */
        }
        .page { background: #fff; border: 1px solid #eee; overflow: hidden; }
        .page img { width: 100%; height: 100%; object-fit: contain; background: #fff; }

        /* 4. Store Finder */
        .finder-sec { display: flex; flex-direction: row; border-top: 1px solid #eee; background: #fff; min-height: 750px; }
        .sidebar { width: 300px; border-right: 1px solid #eee; display: flex; flex-direction: column; background: #fff; }
        .sidebar-header { padding: 30px 25px 10px; text-align: right; }
        .sidebar-header h2 { font-size: 1.4rem; margin: 0; color: var(--hb-navy); }
        .branch-list { flex: 1; overflow-y: hidden; }
        .branch-item { padding: 8px 25px; cursor: pointer; text-align: right; border-bottom: 1px solid #f9f9f9; transition: 0.2s; }
        .branch-item h3 { margin: 0; font-size: 1.05rem; font-weight: 400; color: #888; }
        .branch-item.active { background: var(--hb-navy); padding-right: 35px; }
        .branch-item.active h3 { color: #fff; font-weight: 700; }

        .detail-area { flex: 1; background: var(--hb-bg); padding: 30px; }
        #naverMap { width: 100%; height: 400px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #ddd; }
        .biz-card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: left; }
        .biz-card h2 { font-size: 1.8rem; margin-bottom: 12px; border-bottom: 2px solid var(--hb-gold); padding-bottom: 8px; }
        .btn-row { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px 5px; text-align: center; border-radius: 8px; font-weight: 700; font-size: 1.1rem; text-decoration: none; }
        .btn-navy { background: var(--hb-navy); color: #fff; }
        .btn-kakao { background: #FEE500; color: #3C1E1E; }
        .btn-green { background: #03C75A; color: #fff; }
        .btn-gold { background: var(--hb-gold); color: #fff; }

        /* 📱 모바일 최적화 */
        @media (max-width: 768px) {
            .hero { height: 60vh; } 
            .pc-hide { display: block; }
            .main-store { padding: 50px 20px; }
            .album-viewport { height: 450px; margin: 20px auto; }
            .finder-sec { flex-direction: column; min-height: auto; }
            .sidebar { width: 100%; border-right: none; }
            .sidebar-header { text-align: center; padding: 25px 0 10px; }
            .branch-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 15px; }
            .branch-item { padding: 12px 5px; text-align: center; border: 1px solid #eee; border-radius: 8px; background: #fff; }
            .branch-item h3 { font-size: 0.9rem; }
            .branch-item.active { padding-right: 5px; border-radius: 8px; background: var(--hb-navy); }
            .detail-area { padding: 15px; }
            #naverMap { height: 300px; }
            .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        }
    </style>
</head>
<body>

<section class="hero">
    <div class="hero-content">
        <div class="logo-area"><img src="assets/img/logo.png" alt="Logo"></div>
        <h1>대한민국 <b>한복의 기준</b></h1>
        <div class="sub-text">SINCE 2022, HANBEAM HERITAGE</div>
    </div>
</section>

<section class="video-sec">
    <video autoplay loop muted playsinline><source src="assets/video/brand_video.mp4" type="video/mp4"></video>
</section>

<section class="main-store">
    <div class="hq-slideshow" id="hqSlides">
        <img src="assets/img/hq_01.webp" class="active"><img src="assets/img/hq_02.webp"><img src="assets/img/hq_03.webp">
    </div>
    <h2>한빔한복의 편안한 전지점 매장</h2>
    <p>넓고 깨끗한 한빔한복의 매장에 <br class="pc-hide">부모님을 모시고 편하게 방문하세요!</p>
</section>

<section class="lookbook-sec">
    <h2 style="font-size:2.2rem; margin-bottom:10px;">2026 Lookbook</h2>
    <p style="color:var(--hb-gold); margin-bottom:20px;">옆으로 넘겨보세요</p>
    <div style="margin-bottom:30px;">
        <button class="tab-btn active" id="btnWed" onclick="loadAlbum('wedding')">웨딩 촬영</button>
        <button class="tab-btn" id="btnMot" onclick="loadAlbum('mother')">혼주 한복</button>
    </div>
    <div class="album-viewport" id="albumTarget"><div id="flipBook"></div></div>
</section>

<section class="finder-sec">
    <aside class="sidebar">
        <div class="sidebar-header"><h2>지점 선택</h2></div>
        <div class="branch-list" id="branchList"></div>
    </aside>
    <main class="detail-area" id="detailView">
        <div id="naverMap"></div>
        <div id="branchInfoBox"></div>
    </main>
</section>

<footer style="padding:40px 20px; background:#111; color:#444; text-align:center; font-size:0.8rem;">© 2026 HANBEAM HANBOK.</footer>

<script>
    // 1. 매장 슬라이드
    let curS = 0; const sImgs = document.querySelectorAll('#hqSlides img');
    if(sImgs.length > 0) setInterval(() => { sImgs[curS].classList.remove('active'); curS = (curS + 1) % sImgs.length; sImgs[curS].classList.add('active'); }, 4000);

    // 2. 룩북 로직
    const ALBUM_CONFIG = {
        wedding: { path: "assets/img/lookbook/wedding/wedding_", count: 5 },
        mother: { path: "assets/img/lookbook/mother/mother_", count: 6 }
    };

    let pFlip = null;
    function loadAlbum(cat) {
        const target = document.getElementById('albumTarget');
        if(!target) return;
        target.style.opacity = '0';
        
        setTimeout(() => {
            document.getElementById('btnWed').className = (cat==='wedding' ? 'tab-btn active' : 'tab-btn');
            document.getElementById('btnMot').className = (cat==='mother' ? 'tab-btn active' : 'tab-btn');
            if(pFlip) { pFlip.destroy(); pFlip = null; }
            target.innerHTML = '<div id="flipBook"></div>';
            
            const fb = document.getElementById('flipBook');
            const cfg = ALBUM_CONFIG[cat];
            let h = '';
            for(let i=1; i <= cfg.count; i++) {
                let num = i < 10 ? '0' + i : i;
                h += `<div class="page"><img src="${cfg.path}${num}.webp"></div>`;
            }
            fb.innerHTML = h;
            
            const isMobile = window.innerWidth <= 768;
            
            pFlip = new St.PageFlip(fb, { 
                width: isMobile ? 320 : 850, 
                height: isMobile ? 450 : 850, 
                showCover: false, 
                usePortrait: isMobile, 
                drawShadow: true, 
                flippingTime: 800,
                
                // 🏆 [조작 최적화 핵심 옵션]
                clickEventForward: false, // 탭 시 강제 넘김 방지
                swipeDistance: 15,        // 살짝만 밀어도 넘어가도록 (민감도 향상)
                showPageCorners: true     // 모서리를 살짝 접어 넘기는 영역임을 암시
            });
            pFlip.loadFromHTML(document.querySelectorAll('.page'));
            target.style.opacity = '1'; 
        }, 300);
    }

    window.onload = () => { loadAlbum('wedding'); };
    window.onresize = () => { 
        const activeCat = document.getElementById('btnWed').classList.contains('active') ? 'wedding' : 'mother';
        loadAlbum(activeCat); 
    };
</script>

<script src="map-logic.js"></script>
</body>
</html>
