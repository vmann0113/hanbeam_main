<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>한빔한복 공식 - 전지점 가이드</title>
<style>
    :root { --hb-navy: #0A1D37; --hb-gold: #B8977E; --hb-bg: #F9F7F5; }
    body { margin: 0; font-family: 'Pretendard', sans-serif; background: #fff; color: #333; height: 100vh; overflow: hidden; }
    
    /* 전체 레이아웃: 좌우 분할 */
    .main-container { display: flex; height: 100vh; width: 100%; }

    /* 왼쪽: 지점 리스트 (Scroll) */
    .sidebar { 
        width: 350px; background: var(--hb-navy); color: #fff; 
        display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar-header { padding: 40px 30px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-header h1 { font-size: 1.5rem; margin: 0; color: var(--hb-gold); }
    .sidebar-header p { font-size: 0.8rem; opacity: 0.6; margin-top: 5px; letter-spacing: 1px; }

    .branch-list { flex: 1; overflow-y: auto; }
    .branch-item { 
        padding: 25px 30px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05);
        transition: all 0.3s; position: relative;
    }
    .branch-item:hover { background: rgba(255,255,255,0.05); }
    .branch-item.active { background: #fff; color: var(--hb-navy); }
    .branch-item h3 { margin: 0; font-size: 1.1rem; }
    .branch-item p { margin: 5px 0 0; font-size: 0.85rem; opacity: 0.7; }
    .branch-item.active p { opacity: 1; color: #666; }

    /* 오른쪽: 상세 내용 */
    .content { flex: 1; background: var(--hb-bg); padding: 60px; overflow-y: auto; display: flex; flex-direction: column; }
    
    .detail-view { max-width: 800px; animation: fadeIn 0.5s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .detail-category { color: var(--hb-gold); font-weight: 700; letter-spacing: 2px; font-size: 0.9rem; }
    .detail-title { font-size: 3rem; margin: 10px 0 30px; color: var(--hb-navy); }
    
    /* 가상 이미지 박스 */
    .image-box { 
        width: 100%; height: 400px; background: #ddd; border-radius: 4px; 
        margin-bottom: 40px; display: flex; align-items: center; justify-content: center;
        color: #999; font-weight: bold; border: 1px solid #eee;
    }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 50px; }
    .info-item h4 { margin: 0 0 10px; color: var(--hb-navy); border-bottom: 1px solid var(--hb-gold); display: inline-block; }
    .info-item p { margin: 0; color: #555; font-size: 1rem; line-height: 1.7; }

    .action-group { display: flex; gap: 15px; }
    .btn { 
        padding: 18px 40px; border-radius: 4px; font-weight: 700; text-decoration: none; 
        text-align: center; transition: 0.3s; flex: 1;
    }
    .btn-res { background: var(--hb-navy); color: #fff; }
    .btn-kakao { background: #FEE500; color: #3C1E1E; }
    .btn:hover { opacity: 0.9; transform: translateY(-2px); }

    /* 모바일 대응 */
    @media (max-width: 900px) {
        .main-container { flex-direction: column; overflow: auto; }
        .sidebar { width: 100%; height: auto; }
        .branch-list { display: flex; overflow-x: auto; white-space: nowrap; }
        .branch-item { padding: 15px 25px; border-bottom: none; border-right: 1px solid rgba(255,255,255,0.1); }
        .content { padding: 30px 20px; }
        .detail-title { font-size: 2rem; }
        .info-grid { grid-template-columns: 1fr; gap: 20px; }
    }
</style>
</head>
<body>

<div class="main-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>HANBEAM</h1>
            <p>STORE NETWORK</p>
        </div>
        <div class="branch-list" id="branchList">
            </div>
    </aside>

    <main class="content">
        <div id="detailView" class="detail-view">
            </div>
    </main>
</div>

<script>
    const branches = [
        {id:0, name:"부산본점", addr:"부산 동구 조방로 123 한빔빌딩", tag:"HEADQUARTER", desc:"한빔한복의 심장부, 전 지점의 디자인과 품질을 총괄하는 플래그십 스토어입니다.", res:"https://m.booking.naver.com/booking/6/bizes/661812", kakao:"https://open.kakao.com/o/soq7Ns4d"},
        {id:1, name:"인천점", addr:"인천 남동구 인하로 123", tag:"SEOUL/INCHEON", desc:"수도권 고객님들을 위한 프리미엄 상담 공간과 다양한 컬렉션을 보유하고 있습니다.", res:"https://m.booking.naver.com/booking/13/bizes/1039475", kakao:"https://open.kakao.com/o/sIrXajUf"},
        {id:2, name:"안산점", addr:"경기 안산시 단원구 고잔동", tag:"GYEONGGI", desc:"안산 지역 최대 규모의 한복 전문점으로 맞춤부터 대여까지 원스톱 서비스를 제공합니다.", res:"https://m.booking.naver.com/booking/6/bizes/1500008", kakao:"https://open.kakao.com/o/sqRSjaRh"},
        {id:3, name:"울산점", addr:"울산 남구 삼산로 456", tag:"ULSAN", desc:"울산의 중심에서 만나는 고품격 한복, 한빔의 감각을 직접 경험해보세요.", res:"https://booking.naver.com/booking/6/bizes/1534767", kakao:"https://open.kakao.com/o/sKjCbA0h"},
        {id:4, name:"대구점", addr:"대구 중구 달구벌대로 789", tag:"DAEGU", desc:"전통과 현대가 공존하는 대구점에서 한빔만의 특별한 옷태를 제안합니다.", res:"https://m.place.naver.com/place/2043617700/ticket", kakao:"#"}
        // ... 나머지 지점도 같은 방식으로 추가 가능
    ];

    let activeId = 0;

    function renderList() {
        const listEl = document.getElementById('branchList');
        listEl.innerHTML = branches.map(b => `
            <div class="branch-item ${b.id === activeId ? 'active' : ''}" onclick="selectBranch(${b.id})">
                <h3>${b.name}</h3>
                <p>${b.addr.split(' ').slice(0,2).join(' ')}</p>
            </div>
        `).join('');
    }

    function selectBranch(id) {
        activeId = id;
        renderList();
        renderDetail();
    }

    function renderDetail() {
        const b = branches.find(item => item.id === activeId);
        const detailEl = document.getElementById('detailView');
        
        detailEl.innerHTML = `
            <div class="detail-category">${b.tag}</div>
            <h2 class="detail-title">한빔한복 ${b.name}</h2>
            
            <div class="image-box">
                [ ${b.name} 실제 매장 내부 사진 영역 ]
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <h4>지점 소개</h4>
                    <p>${b.desc}</p>
                </div>
                <div class="info-item">
                    <h4>위치 안내</h4>
                    <p>${b.addr}<br>매장 앞 전용 주차장 완비</p>
                </div>
            </div>

            <div class="action-group">
                <a href="${b.res}" target="_blank" class="btn btn-res">네이버 실시간 예약</a>
                <a href="${b.kakao}" target="_blank" class="btn btn-kakao">카카오톡 1:1 상담</a>
            </div>
        `;
    }

    // 초기 실행
    renderList();
    renderDetail();
</script>

</body>
</html>
