<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <title>한빔한복 공식 홈페이지</title>

    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=pgxefrkkuy"></script>

    <style>
        :root { --hb-navy: #0A1D37; --hb-gold: #B8977E; --hb-bg: #F9F7F5; --hb-navy-light: #1A3A5F; }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: #fff; color: #333; overflow-x: hidden; }

        /* 1. Hero: Dynamic Pattern 복구 */
        .hero { height: 100vh; background: linear-gradient(135deg, var(--hb-navy), var(--hb-navy-light), var(--hb-navy)); color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; overflow: hidden; }
        .hero::after { 
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='0.03' fill-rule='evenodd'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7z'/%3E%3C/g%3E%3C/svg%3E");
            background-repeat: repeat; animation: patternWave 60s linear infinite; opacity: 0.5; z-index: 1;
        }
        @keyframes patternWave { from { background-position: 0 0; } to { background-position: 1000px 500px; } }
        .hero-content { z-index: 10; padding: 20px; }
        .logo-area { width: 300px; margin: 0 auto 30px; display: flex; justify-content: center; }
        .logo-area img { width: 100%; height: auto; }
        .hero h1 { font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 200; margin: 0; }
        .hero h1 b { font-weight: 700; color: var(--hb-gold); }
        .hero .sub-text { margin-top: 25px; font-size: 1.2rem; opacity: 0.6; letter-spacing: 2px; }

        /* 2. Video & Main Store Slideshow 복구 */
        .video-sec { height: 75vh; background: #000; overflow: hidden; }
        .video-sec video { width: 100%; height: 100%; object-fit: cover; }
        .main-store { padding: 120px 20px; background: var(--hb-bg); text-align: center; }
        .hq-slideshow { max-width: 1000px; margin: 0 auto 50px; height: 500px; position: relative; overflow: hidden; border-radius: 4px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .hq-slideshow img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity: 0; transition: opacity 2s ease-in-out; }
        .hq-slideshow img.active { opacity: 1; }
        .main-store h2 { font-size: 2.5rem; color: var(--hb-navy); margin-bottom: 20px; }
        .main-store p { max-width: 800px; margin: 0 auto; color: #666; font-size: 1.1rem; line-height: 1.8; }

        /* 3. Lookbook 복구 */
        .lookbook-sec { padding: 100px 0; background: #fff; text-align: center; }
        .tab-group { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .tab-btn { padding: 12px 35px; border: 1px solid var(--hb-gold); background: #fff; color: var(--hb-gold); cursor: pointer; font-weight: 700; border-radius: 50px; }
        .tab-btn.active { background: var(--hb-gold); color: #fff; }
        .album-viewport { margin: 0 auto; width: 90vw; max-width: 1000px; height: 750px; display: flex; justify-content: center; align-items: center; }
        .page { background: #fff; border: 1px solid #eee; overflow: hidden; }
        .page img { width: 100%; height: 100%; object-fit: cover; }

        /* 4. Store Finder 복구 */
        .finder-sec { display: flex; height: 85vh; border-top: 1px solid #eee; background: #fff; }
        .sidebar { width: 300px; border-right: 1px solid #eee; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-header { padding: 40px 30px 10px; text-align: right; }
        .branch-list { flex: 1; overflow-y: hidden; }
        .branch-item { padding: 10px 30px; cursor: pointer; text-align: right; border-bottom: 1px solid #f9f9f9; transition: 0.2s; }
        .branch-item.active { background: var(--hb-navy); color: #fff; border-radius: 0 50px 50px 0; margin-right: -1px; padding-right: 40px; font-weight: 700; }
        .branch-item h3 { margin: 0; font-size: 0.95rem; }

        .detail-area { flex: 1; background: var(--hb-bg); padding: 40px; overflow-y: auto; }
        #naverMap { width: 100%; height: 350px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #ddd; }
        .biz-card { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); margin-bottom: 25px; }
        .biz-card h2 { font-size: 1.8rem; color: var(--hb-navy); margin-bottom: 15px; border-bottom: 2px solid var(--hb-gold); padding-bottom: 10px; }
        .info-row { display: flex; margin-bottom: 8px; font-size: 1rem; }
        .info-lbl { width: 90px; font-weight: 700; color: #777; }
        .btn-row { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 18px 10px; text-align: center; border-radius: 6px; font-weight: 700; font-size: 0.85rem; text-decoration: none; }
        .btn-navy { background: var(--hb-navy); color: #fff; }
        .btn-kakao { background: #FEE500; color: #3C1E1E; }
        .btn-green { background: #03C75A; color: #fff; }

        @media (max-width: 1024px) {
            .finder-sec { flex-direction: column; height: auto; }
            .sidebar { width: 100%; }
            .branch-list { display: flex; overflow-x: auto; padding: 10px; }
            .branch-item { white-space: nowrap; border-bottom: none; border-right: 1px solid #eee; padding: 10px 20px; }
            .btn-row { flex-direction: column; }
            .album-viewport { height: 500px; }
        }
    </style>
</head>
<body>

<section class="hero">
    <div class="hero-content">
        <div class="logo-top">HANBEAM HANBOK</div>
        <div class="logo-area">
            <img src="assets/img/logo.png" alt="Hanbeam Logo" onerror="this.src='assets/logo.png'; this.onerror=function(){this.style.display='none';};">
        </div>
        <h1>대한민국 <b>한복의 기준</b></h1>
        <div class="sub-text">SINCE 2022, HANBEAM HERITAGE</div>
    </div>
</section>

<section class="video-sec">
    <video autoplay loop muted playsinline><source src="assets/video/brand_video.mp4" type="video/mp4"></video>
</section>

<section class="main-store">
    <div class="hq-slideshow" id="hqSlides">
        <img src="assets/img/hq_01.webp" class="active">
        <img src="assets/img/hq_02.webp">
        <img src="assets/img/hq_03.webp">
    </div>
    <h2>한빔한복의 편안한 전지점 매장</h2>
    <p>넓고 깨끗한 한빔한복의 매장에 부모님을 모시고 편하게 방문하세요!</p>
</section>

<section class="lookbook-sec">
    <h2>2026 Lookbook</h2>
    <div class="tab-group">
        <button class="tab-btn active" id="btnWed" onclick="loadAlbum('wedding')">웨딩 촬영</button>
        <button class="tab-btn" id="btnMot" onclick="loadAlbum('mother')">혼주 한복</button>
    </div>
    <div class="album-viewport"><div id="flipBook"></div></div>
</section>

<section class="finder-sec">
    <aside class="sidebar">
        <div class="sidebar-header"><h2>전국 지점(11개)</h2></div>
        <div class="branch-list" id="branchList"></div>
    </aside>
    <main class="detail-area" id="detailView"></main>
</section>

<footer style="padding:40px; background:#111; color:#444; text-align:center; font-size:0.8rem;">© 2026 HANBEAM HANBOK. ALL RIGHTS RESERVED.</footer>

<script>
    // 1. 매장 사진 슬라이드 로직
    let curS = 0; const sImgs = document.querySelectorAll('#hqSlides img');
    if(sImgs.length > 0) setInterval(() => { 
        sImgs[curS].classList.remove('active'); 
        curS = (curS + 1) % sImgs.length; 
        sImgs[curS].classList.add('active'); 
    }, 4000);

    // 2. 룩북 데이터 및 제어
    const ALBUMS = {
        wedding: ["assets/img/lookbook/wedding/wedding_01.webp", "assets/img/lookbook/wedding/wedding_02.webp", "assets/img/lookbook/wedding/wedding_03.webp", "assets/img/lookbook/wedding/wedding_04.webp", "assets/img/lookbook/wedding/wedding_05.webp", "assets/img/lookbook/wedding/wedding_06.webp"],
        mother: ["assets/img/lookbook/mother/mother_01.webp", "assets/img/lookbook/mother/mother_02.webp", "assets/img/lookbook/mother/mother_03.webp", "assets/img/lookbook/mother/mother_04.webp", "assets/img/lookbook/mother/mother_05.webp", "assets/img/lookbook/mother/mother_06.webp"]
    };

    let pFlip = null;
    function loadAlbum(cat) {
        document.getElementById('btnWed').classList.toggle('active', cat==='wedding');
        document.getElementById('btnMot').classList.toggle('active', cat==='mother');
        const fb = document.getElementById('flipBook');
        if(pFlip) pFlip.destroy();
        
        let h = `<div class="page"><div style="background:var(--hb-navy);color:#fff;height:100%;display:flex;align-items:center;justify-content:center;text-align:center;"><h3>${cat.toUpperCase()}</h3></div></div>`;
        ALBUMS[cat].forEach(img => { h += `<div class="page"><img src="${img}" onerror="this.src='https://via.placeholder.com/550x750?text=Hanbeam+Photo'"></div>`; });
        h += `<div class="page"><div style="background:var(--hb-navy);color:#fff;height:100%;display:flex;align-items:center;justify-content:center;"><h3>THE END</h3></div></div>`;
        fb.innerHTML = h;

        setTimeout(() => {
            pFlip = new St.PageFlip(fb, { width: 550, height: 750, showCover: true, usePortrait: false });
            pFlip.loadFromHTML(document.querySelectorAll('.page'));
        }, 150);
    }

    // 3. 지점 데이터 & 지도 제어
    const branches = [
        {name:"부산점", phone:"051-634-2325", addr:"부산 동구 조방로 123", reserve:"https://m.booking.naver.com/booking/6/bizes/661812", kakao:"https://open.kakao.com/o/soq7Ns4d", lat:35.1381, lng:129.0621},
        {name:"센텀점", phone:"010-3052-2325", addr:"부산 해운대구 센텀중앙로 78", reserve:"https://booking.naver.com/booking/6/bizes/1577219", kakao:"https://open.kakao.com/o/sz1xltbi", lat:35.1742, lng:129.1275},
        {name:"김해점", phone:"010-8065-2325", addr:"경남 김해시 김해대로 2325", reserve:"https://booking.naver.com/booking/6/bizes/1402679", kakao:"https://open.kakao.com/o/sHM2wwsh", lat:35.2285, lng:128.8781},
        {name:"창원점", phone:"055-263-2325", addr:"경남 창원시 성산구 상남로 12", reserve:"https://booking.naver.com/booking/6/bizes/843111", kakao:"https://open.kakao.com/o/sdcvbh5e", lat:35.2211, lng:128.6834},
        {name:"양산점", phone:"055-912-0425", addr:"경남 양산시 물금읍 청운로", reserve:"https://booking.naver.com/booking/13/bizes/868629", kakao:"https://open.kakao.com/o/sp44Hxaf", lat:35.3282, lng:129.0145},
        {name:"진주점", phone:"010-5654-2407", addr:"경남 진주시 강남로 231", reserve:"https://m.booking.naver.com/booking/6/bizes/1485854", kakao:"https://open.kakao.com/o/sbxBToNh", lat:35.1834, lng:128.0872},
        {name:"인천점", phone:"032-283-2325", addr:"인천 남동구 인하로 497-15", reserve:"https://m.booking.naver.com/booking/13/bizes/1039475", kakao:"https://open.kakao.com/o/sIrXajUf", lat:37.4442, lng:126.7025},
        {name:"안산점", phone:"010-6591-2322", addr:"경기 안산시 단원구 고잔로 108", reserve:"https://m.booking.naver.com/booking/6/bizes/1500008", kakao:"https://open.kakao.com/o/sqRSjaRh", lat:37.3162, lng:126.8302},
        {name:"마산점", phone:"010-8832-2325", addr:"경남 창원시 마산회원구 양덕로", reserve:"https://booking.naver.com/booking/6/bizes/1526541", kakao:"https://open.kakao.com/o/ssWvuvYh", lat:35.2341, lng:128.5834},
        {name:"울산점", phone:"010-9807-2325", addr:"울산 남구 삼산로 273", reserve:"https://booking.naver.com/booking/6/bizes/1534767", kakao:"https://open.kakao.com/o/sKjCbA0h", lat:35.5392, lng:129.3352},
        {name:"대구점", phone:"010-8492-2328", addr:"대구 중구 달구벌대로 2141", reserve:"https://m.place.naver.com/place/2043617700/ticket", kakao:"https://open.kakao.com/o/sqPdeNfi", lat:35.8642, lng:128.5931}
    ];

    let cIdx = 0;
    function renderS() {
        const l = document.getElementById('branchList');
        l.innerHTML = branches.map((b, i) => `<div class="branch-item ${i===cIdx?'active':''}" onclick="goB(${i})"><h3>${b.name}</h3></div>`).join('');
        const b = branches[cIdx];
        document.getElementById('detailView').innerHTML = `<div id="naverMap"></div><div class="biz-card"><h2>한빔한복 ${b.name}</h2><div class="info-row"><span class="info-lbl">위치</span><span>${b.addr}</span></div><div class="info-row"><span class="info-lbl">전화</span><span>${b.phone}</span></div></div><div class="btn-row"><a href="tel:${b.phone}" class="btn btn-navy">전화걸기</a><a href="${b.kakao}" target="_blank" class="btn btn-kakao">카톡상담</a><a href="${b.reserve}" target="_blank" class="btn btn-green">네이버예약</a></div>`;
        
        setTimeout(() => {
            if (typeof naver !== 'undefined' && naver.maps) {
                const p = new naver.maps.LatLng(b.lat, b.lng);
                const map = new naver.maps.Map('naverMap', { center: p, zoom: 16 });
                new naver.maps.Marker({ position: p, map: map });
            }
        }, 300);
    }
    function goB(i) { cIdx = i; renderS(); }
    
    // 초기 실행
    window.onload = () => { 
        loadAlbum('wedding'); 
        renderS(); 
    };
</script>
</body>
</html>
