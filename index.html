<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>한빔한복 공식 홈페이지 - 전국 11개 지점 네트워크</title>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=YOUR_CLIENT_ID"></script>

<style>
    :root { --hb-navy: #0A1D37; --hb-gold: #B8977E; --hb-bg: #F9F7F5; --hb-navy-light: #1A3A5F; }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body { margin: 0; font-family: 'Pretendard', sans-serif; color: #333; background: #fff; line-height: 1.6; overflow-x: hidden; }
    a { text-decoration: none; color: inherit; cursor: pointer; transition: 0.3s; }

    /* 1. Hero: Dynamic Pattern */
    .hero { height: 100vh; color: #fff; text-align: center; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(135deg, var(--hb-navy), var(--hb-navy-light), var(--hb-navy)); background-size: 300% 300%; animation: gradientFlow 15s ease infinite; }
    .hero::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='0.03' fill-rule='evenodd'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43 0c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3z'/%3E%3C/g%3E%3C/svg%3E"); background-repeat: repeat; background-size: 150px 150px; opacity: 0.5; animation: patternWave 60s linear infinite; z-index: 1; }
    @keyframes gradientFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes patternWave { from { background-position: 0 0; } to { background-position: 1000px 500px; } }
    .hero-content { position: relative; z-index: 10; padding: 20px; }
    .logo-top { font-size: 1.1rem; letter-spacing: 0.5em; margin-bottom: 20px; opacity: 0.8; }
    .logo-area { width: 300px; height: 120px; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; border: 1px dashed rgba(255,255,255,0.2); }
    .hero h1 { font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 200; margin: 0; }
    .hero h1 b { font-weight: 700; color: var(--hb-gold); }
    .hero .sub-text { margin-top: 25px; font-size: 1.2rem; opacity: 0.6; letter-spacing: 2px; }

    /* 2. Video */
    .video-sec { height: 75vh; background: #000; overflow: hidden; }
    .video-sec video { width: 100%; height: 100%; object-fit: cover; }

    /* 3. Main Store (Dissolve Slideshow) */
    .main-store { padding: 120px 20px; background: var(--hb-bg); text-align: center; }
    .hq-slideshow { 
        max-width: 1100px; margin: 0 auto 50px; height: 500px; 
        position: relative; overflow: hidden; border-radius: 4px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
    }
    .hq-slideshow img { 
        position: absolute; top:0; left:0; width:100%; height:100%; object-fit:cover;
        opacity: 0; transition: opacity 2s ease-in-out; 
    }
    .hq-slideshow img.active { opacity: 1; }

    /* 4. Lookbook */
    .lookbook-sec { padding: 100px 0; background: #fff; text-align: center; }
    .album-viewport { margin: 40px auto; width: 90vw; max-width: 1100px; height: 750px; display: flex; justify-content: center; align-items: center; }
    .page { background: #fff; border: 1px solid #eee; overflow: hidden; }

    /* 5. Store Finder */
    .finder-sec { display: flex; height: 85vh; border-top: 1px solid #eee; background: #fff; }
    .sidebar { width: 320px; background: #fff; border-right: 1px solid #eee; display: flex; flex-direction: column; }
    .sidebar-header { padding: 40px 30px 15px; text-align: right; }
    .branch-list { flex: 1; overflow-y: hidden; }
    .branch-item { padding: 12px 30px; cursor: pointer; text-align: right; border-bottom: 1px solid #f8f8f8; }
    .branch-item.active { background: var(--hb-navy); color: #fff; font-weight: 700; padding-right: 40px; border-radius: 0 50px 50px 0; }
    .detail-area { flex: 1; background: var(--hb-bg); padding: 40px 60px; overflow-y: auto; }
    #naverMap { width: 100%; height: 320px; background: #eee; border-radius: 8px; margin-bottom: 25px; border: 1px solid #e0e0e0; }
    .biz-card { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); margin-bottom: 25px; }
    .btn-row { display: flex; gap: 10px; width: 100%; }
    .btn { flex: 1; padding: 18px 10px; text-align: center; border-radius: 6px; font-weight: 700; font-size: 0.85rem; }
    .btn-navy { background: var(--hb-navy); color: #fff; }
    .btn-kakao { background: #FEE500; color: #3C1E1E; }
    .btn-green { background: #03C75A; color: #fff; }
    .btn-gold { background: var(--hb-gold); color: #fff; }

    @media (max-width: 1024px) {
        .finder-sec { flex-direction: column; height: auto; }
        .sidebar { width: 100%; }
        .branch-list { display: flex; overflow-x: auto; padding: 10px 20px; }
        .btn-row { flex-direction: column; }
    }
</style>
</head>
<body>

<section class="hero">
    <div class="hero-content">
        <div class="logo-top">HANBEAM HANBOK</div>
        <div class="logo-area" id="mainLogo"><span style="opacity:0.3; font-size:0.9rem;">LOGO / CALLIGRAPHY AREA</span></div>
        <h1>대한민국 <b>한복의 기준</b></h1>
        <div class="sub-text">SINCE 1994, HANBEAM HERITAGE</div>
    </div>
</section>

<section class="video-sec">
    </section>

<section class="main-store">
    <div class="hq-slideshow" id="hqSlides">
        <img src="assets/img/hq_01.webp" class="active" alt="부산점 전경 1">
        <img src="assets/img/hq_02.webp" alt="부산점 전경 2">
        <img src="assets/img/hq_03.webp" alt="부산점 전경 3">
    </div>
    <h2>한빔한복 부산점</h2>
    <p>30년 전통의 장인정신이 깃든 한빔의 심장부입니다.</p>
</section>

<section class="lookbook-sec">
    <h2>2026 Lookbook</h2>
    <div class="album-viewport"><div id="flipBook"></div></div>
</section>

<section class="finder-sec">
    <aside class="sidebar">
        <div class="sidebar-header"><h2>전국 지점 안내(11개)</h2></div>
        <div class="branch-list" id="branchList"></div>
    </aside>
    <main class="detail-area" id="detailView"></main>
</section>

<script>
    // 1. 본점 사진 슬라이드 로직
    let currentSlide = 0;
    const slides = document.querySelectorAll('#hqSlides img');
    function nextSlide() {
        slides[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].classList.add('active');
    }
    setInterval(nextSlide, 4000); // 4초마다 교체

    // 2. 3D 앨범 초기화
    let pageFlip;
    function initAlbum() {
        const flipBook = document.getElementById('flipBook');
        pageFlip = new St.PageFlip(flipBook, { width: 550, height: 750, showCover: true, usePortrait: false });
        const html = `
            <div class="page"><div style="background:var(--hb-navy);color:#fff;height:100%;display:flex;flex-direction:column;justify-content:center;text-align:center;"><h3>Hanbeam<br>Lookbook</h3></div></div>
            <div class="page"><div style="background:#eee;height:100%;display:flex;align-items:center;justify-content:center;">Photo 01</div></div>
            <div class="page"><div style="background:#ddd;height:100%;display:flex;align-items:center;justify-content:center;">Photo 02</div></div>
            <div class="page"><div style="background:var(--hb-navy);color:#fff;height:100%;display:flex;align-items:center;justify-content:center;"><h3>THE END</h3></div></div>
        `;
        flipBook.innerHTML = html;
        pageFlip.loadFromHTML(document.querySelectorAll('.page'));
    }

    // 3. 지점 데이터 및 지도 연동
    const branches = [
        {name:"부산점", phone:"0516342325", addr:"부산 동구 조방로 123", reserve:"https://m.booking.naver.com/booking/6/bizes/661812", kakao:"https://open.kakao.com/o/soq7Ns4d", lat:35.1381, lng:129.0621},
        {name:"센텀점", phone:"01030522325", addr:"부산 해운대구 센텀중앙로 78", reserve:"https://booking.naver.com/booking/6/bizes/1577219", kakao:"https://open.kakao.com/o/sz1xltbi", lat:35.1742, lng:129.1275},
        {name:"김해점", phone:"01080652325", addr:"경남 김해시 김해대로 2325", reserve:"https://booking.naver.com/booking/6/bizes/1402679", kakao:"https://open.kakao.com/o/sHM2wwsh", lat:35.2285, lng:128.8781},
        {name:"창원점", phone:"0552632325", addr:"경남 창원시 성산구 상남로 12", reserve:"https://booking.naver.com/booking/6/bizes/843111", kakao:"https://open.kakao.com/o/sdcvbh5e", lat:35.2211, lng:128.6834},
        {name:"양산점", phone:"0559120425", addr:"경남 양산시 물금읍 청운로", reserve:"https://booking.naver.com/booking/13/bizes/868629", kakao:"https://open.kakao.com/o/sp44Hxaf", lat:35.3282, lng:129.0145},
        {name:"진주점", phone:"01056542407", addr:"경남 진주시 강남로 231", reserve:"https://m.booking.naver.com/booking/6/bizes/1485854", kakao:"https://open.kakao.com/o/sbxBToNh", lat:35.1834, lng:128.0872},
        {name:"인천점", phone:"0322832325", addr:"인천 남동구 인하로 497-15", reserve:"https://m.booking.naver.com/booking/13/bizes/1039475", kakao:"https://open.kakao.com/o/sIrXajUf", lat:37.4442, lng:126.7025},
        {name:"안산점", phone:"01065912322", addr:"경기 안산시 단원구 고잔로 108", reserve:"https://m.booking.naver.com/booking/6/bizes/1500008", kakao:"https://open.kakao.com/o/sqRSjaRh", lat:37.3162, lng:126.8302},
        {name:"마산점", phone:"01088322325", addr:"경남 창원시 마산회원구 양덕로", reserve:"https://booking.naver.com/booking/6/bizes/1526541", kakao:"https://open.kakao.com/o/ssWvuvYh", lat:35.2341, lng:128.5834},
        {name:"울산점", phone:"01098072325", addr:"울산 남구 삼산로 273", reserve:"https://booking.naver.com/booking/6/bizes/1534767", kakao:"https://open.kakao.com/o/sKjCbA0h", lat:35.5392, lng:129.3352},
        {name:"대구점", phone:"01084922328", addr:"대구 중구 달구벌대로 2141", reserve:"https://m.place.naver.com/place/2043617700/ticket", kakao:"https://open.kakao.com/o/sqPdeNfi", lat:35.8642, lng:128.5931}
    ];

    let activeIdx = 0, map = null, marker = null;

    function renderFinder() {
        const list = document.getElementById('branchList');
        list.innerHTML = branches.map((b, i) => `<div class="branch-item ${i===activeIdx?'active':''}" onclick="selectBranch(${i})"><h3>${b.name}</h3></div>`).join('');
        const b = branches[activeIdx];
        document.getElementById('detailView').innerHTML = `
            <div id="naverMap"></div>
            <div class="biz-card"><h3>한빔한복 ${b.name}</h3><div class="info-row"><span class="info-lbl">위치</span><span>${b.addr}</span></div><div class="info-row"><span class="info-lbl">전화</span><span>${b.phone}</span></div></div>
            <div class="btn-row"><a href="tel:${b.phone}" class="btn btn-navy">전화 바로걸기</a><a href="${b.kakao}" target="_blank" class="btn btn-kakao">카톡 상담</a><a href="${b.reserve}" target="_blank" class="btn btn-green">네이버 예약</a><a href="#" class="btn btn-gold">위치 공유</a></div>
        `;
        setTimeout(() => {
            const pos = new naver.maps.LatLng(b.lat, b.lng);
            if (!map) { map = new naver.maps.Map('naverMap', { center: pos, zoom: 16 }); marker = new naver.maps.Marker({ position: pos, map: map }); }
            else { map.setCenter(pos); marker.setPosition(pos); }
        }, 100);
    }

    function selectBranch(i) { activeIdx = i; renderFinder(); }
    window.onload = () => { initAlbum(); renderFinder(); };
</script>
</body>
</html>
