<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>한빔한복 공식 - 3D Lookbook & Store Finder</title>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">

<style>
    :root { --hb-navy: #0A1D37; --hb-gold: #B8977E; --hb-bg: #F4F1EE; }
    body { margin: 0; font-family: 'Pretendard', sans-serif; background: #fff; color: #333; overflow-x: hidden; }

    /* 1. Hero Section */
    .hero { 
        height: 60vh; background: var(--hb-navy); color: #fff;
        display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
    }
    .hero h1 { font-size: 3rem; margin: 0; font-weight: 700; }
    .hero h1 b { color: var(--hb-gold); font-weight: 300; }
    .hero p { opacity: 0.7; margin-top: 20px; letter-spacing: 2px; }

    /* 2. 3D Lookbook Section */
    .lookbook-section { padding: 100px 20px; background: var(--hb-bg); text-align: center; }
    .lookbook-tabs { margin-bottom: 50px; }
    .tab-btn { 
        padding: 12px 30px; margin: 0 10px; border: 1px solid var(--hb-gold); 
        background: transparent; color: var(--hb-gold); cursor: pointer; font-weight: 700;
        transition: 0.3s; border-radius: 50px;
    }
    .tab-btn.active { background: var(--hb-gold); color: #fff; }

    /* 책 컨테이너 */
    .album-container { 
        display: flex; justify-content: center; align-items: center; 
        margin: 0 auto; max-width: 1000px; padding: 20px;
    }
    .page-wrapper { box-shadow: 0 20px 50px rgba(0,0,0,0.2); background: #fff; }
    
    /* 개별 페이지 스타일 */
    .page { background-color: white; overflow: hidden; border: 1px solid #ddd; }
    .page-content { width: 100%; height: 100%; display: flex; flex-direction: column; }
    .page-img { width: 100%; height: 100%; object-fit: cover; background: #eee; }
    .page-text { padding: 20px; background: rgba(255,255,255,0.9); text-align: left; }

    /* 3. Store Finder (좌우 분할) */
    .store-finder { display: flex; height: 700px; border-top: 1px solid #eee; }
    .sidebar { width: 350px; background: #fff; border-right: 1px solid #eee; overflow-y: auto; text-align: right; }
    .branch-item { padding: 25px 30px; cursor: pointer; border-bottom: 1px solid #f9f9f9; transition: 0.3s; }
    .branch-item.active { background: var(--hb-navy); color: #fff; padding-right: 50px; }
    
    .detail-content { flex: 1; background: #fafafa; padding: 60px; }
    .map-box { width: 100%; height: 300px; background: #eee; border-radius: 8px; margin-bottom: 20px; position: relative; }
    .pin { position: absolute; top: 50%; left: 50%; width: 15px; height: 15px; background: var(--hb-gold); border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% {transform:scale(1); opacity:1;} 100% {transform:scale(2.5); opacity:0;} }

    @media (max-width: 768px) {
        .store-finder { flex-direction: column; height: auto; }
        .sidebar { width: 100%; display: flex; overflow-x: auto; }
        .branch-item { text-align: center; white-space: nowrap; }
    }
</style>
</head>
<body>

<section class="hero">
    <h1>한빔한복 <b>Digital Atelier</b></h1>
    <p>전통의 아름다움을 페이지에 담다</p>
</section>

<section class="lookbook-section">
    <div class="lookbook-tabs">
        <button class="tab-btn active" onclick="changeAlbum('wedding')">웨딩 촬영 앨범</button>
        <button class="tab-btn" onclick="changeAlbum('mother')">혼주 한복 앨범</button>
    </div>

    <div class="album-container">
        <div id="album-wedding" class="page-wrapper">
            <div class="page" data-density="hard">
                <div class="page-content">
                    <div style="padding:100px 40px; background:var(--hb-navy); color:#fff; height:100%;">
                        <h2 style="font-family:serif;">Wedding Collection</h2>
                        <p>한빔이 제안하는 가장 빛나는 순간</p>
                        <small style="margin-top:50px; display:block;">(마우스로 페이지 끝을 잡아 넘겨보세요)</small>
                    </div>
                </div>
            </div>
            <div class="page"><img src="https://via.placeholder.com/500x700/f9f7f5/333?text=Wedding+01" class="page-img"></div>
            <div class="page"><img src="https://via.placeholder.com/500x700/f4f1ee/333?text=Wedding+02" class="page-img"></div>
            <div class="page"><img src="https://via.placeholder.com/500x700/f9f7f5/333?text=Wedding+03" class="page-img"></div>
            <div class="page" data-density="hard">
                <div class="page-content" style="background:#eee; justify-content:center;"><h3>THE END</h3></div>
            </div>
        </div>
    </div>
</section>

<section class="store-finder">
    <aside class="sidebar" id="branchList"></aside>
    <main class="detail-content" id="detailView"></main>
</section>

<script>
    // 1. 3D PageFlip 초기화
    let pageFlip;
    function initFlip(id) {
        if(pageFlip) pageFlip.destroy();
        const el = document.getElementById(id);
        pageFlip = new St.PageFlip(el, {
            width: 400, height: 600,
            showCover: true,
            mobileScrollSupport: false
        });
        pageFlip.loadFromHTML(document.querySelectorAll('.page'));
    }

    // 2. 앨범 전환 로직
    function changeAlbum(type) {
        alert(type + " 앨범 데이터를 로드합니다. (실제 구현시 페이지 내용 교체)");
        // 실제 운영시에는 페이지 안의 img src들을 배열로 관리하며 교체하면 됩니다.
    }

    // 3. 지점 데이터 및 렌더링
    const branches = [
        {name:"부산본점", addr:"부산 동구 조방로 123", desc:"한빔의 심장부, 장인이 상주하는 본점입니다."},
        {name:"인천점", addr:"인천 남동구 인하로 45", desc:"수도권 최대 규모의 한빔 거점 매장입니다."},
        {name:"안산점", addr:"경기 안산시 단원구", desc:"정성어린 맞춤 상담으로 유명한 지점입니다."}
    ];

    let activeIdx = 0;
    function renderStore() {
        const list = document.getElementById('branchList');
        list.innerHTML = branches.map((b, i) => `
            <div class="branch-item ${i===activeIdx?'active':''}" onclick="selectStore(${i})">
                <h3>${b.name}</h3>
                <p>${b.addr}</p>
            </div>
        `).join('');

        const b = branches[activeIdx];
        document.getElementById('detailView').innerHTML = `
            <div class="map-box"><div class="pin"></div></div>
            <h2 style="color:var(--hb-navy)">${b.name}</h2>
            <p>${b.desc}</p>
            <div style="margin-top:30px; display:flex; gap:10px;">
                <a href="#" style="background:var(--hb-navy); color:#fff; padding:15px 30px; text-decoration:none;">네이버 예약</a>
                <a href="#" style="background:#fee500; color:#3c1e1e; padding:15px 30px; text-decoration:none;">카카오톡 상담</a>
            </div>
        `;
    }

    function selectStore(i) { activeIdx = i; renderStore(); }

    window.onload = () => {
        initFlip('album-wedding');
        renderStore();
    };
</script>

</body>
</html>
