    <style>
        :root {
    --hb-gold: #c5a059;
    --hb-bg: #F9F7F5;
    --hb-navy: #000000;
}

/* 1. Hero 섹션 */
.hero {
    height: 100vh; display: flex; flex-direction: column; justify-content: center;
    align-items: center; text-align: center; position: relative; overflow: hidden; padding: 20px;
    background: url('/assets/img/traditional_pattern.png'), radial-gradient(circle at center, #151515 0%, #000000 100%);
    background-repeat: repeat, no-repeat; background-size: 700px, 100% 100%;
    animation: heroAnimation 120s linear infinite;
}

.hero::after {
    content: ""; position: absolute; top: 0; left: -150%; width: 150%; height: 100%;
    background: linear-gradient(110deg, transparent 0%, rgba(255, 255, 255, 0.01) 45%, rgba(255, 255, 255, 0.03) 50%, rgba(255, 255, 255, 0.01) 55%, transparent 100%);
    transform: skewX(-25deg); animation: flowSheen 25s ease-in-out infinite; z-index: 2; pointer-events: none;
}

@keyframes heroAnimation { 0% { background-position: 0 0, 0 0; } 100% { background-position: -500px -500px, 0 0; } }
@keyframes flowSheen { 0% { left: -150%; opacity: 0; } 50% { left: 150%; opacity: 1; } 100% { left: 150%; opacity: 0; } }

.hero-content { z-index: 10; position: relative; width: 100%; }
.logo-area { width: 90%; max-width: 420px; margin: 0 auto 35px; }
.logo-area img { width: 100%; height: auto; display: block; margin: 0 auto; filter: brightness(1.1) drop-shadow(0 0 15px rgba(0,0,0,0.9)); }
.hero h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 200; margin: 0; color: #fff; }
.hero h1 b { font-weight: 700; color: #c5a059; }
.hero .sub-text { margin-top: 25px; font-size: 0.9rem; color: #c5a059; letter-spacing: 6px; font-weight: 300; opacity: 0.9; text-transform: uppercase; }

/* 2. Main Store & Video */
.video-sec { width: 100%; height: auto; aspect-ratio: 16 / 9; background: #000; overflow: hidden; }
.video-sec video { width: 100%; height: 100%; object-fit: cover; }
.main-store { padding: 120px 20px; background: var(--hb-bg); text-align: center; }
.hq-slideshow { width: 100%; max-width: 1200px; aspect-ratio: 16 / 9; margin: 0 auto 60px; position: relative; border-radius: 4px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
.hq-slideshow img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity: 0; transition: opacity 2s ease-in-out; }
.hq-slideshow img.active { opacity: 1; }
.main-store h2 { font-size: 3rem; color: #111; margin-bottom: 25px; }
.main-store p { font-size: 1.44rem; color: #666; max-width: 1000px; margin: 0 auto; font-weight: 400; line-height: 1.6; }
.pc-hide { display: none; }

/* 3. Lookbook */
.lookbook-sec { padding: 120px 0; background: #fff; text-align: center; transition: background 0.6s ease; }
.lookbook-sec.active-focus { background: #111; color: #fff; }
.lookbook-sec.active-focus h2, .lookbook-sec.active-focus p { color: #fff !important; }
.tab-btn { padding: 15px 45px; border: 2px solid var(--hb-gold); background: #fff; color: var(--hb-gold); cursor: pointer; font-weight: 700; border-radius: 50px; margin: 10px; font-size: 1.1rem; transition: 0.3s; display: inline-block; }
.tab-btn.active { background: var(--hb-gold); color: #fff !important; }
.album-viewport { margin: 50px auto; width: 90%; max-width: 850px; height: 850px; display: flex; justify-content: center; align-items: center; position: relative; }
.page { background: #fff; cursor: pointer; }
.page img { width: 100%; height: 100%; object-fit: contain; }

/* 4. Store Finder & Buttons */
.finder-sec { display: flex; flex-direction: row; border-top: 1px solid #eee; background: #fff; min-height: 750px; }
.sidebar { width: 300px; border-right: 1px solid #eee; display: flex; flex-direction: column; background: #fff; }
.sidebar-header { padding: 30px 25px 10px; text-align: right; }
.sidebar-header h2 { font-size: 1.4rem; margin: 0; color: #111; }
.branch-list { flex: 1; overflow-y: hidden; }
.branch-item { padding: 10px 25px; cursor: pointer; text-align: right; border-bottom: 1px solid #f9f9f9; transition: 0.2s; }
.branch-item h3 { margin: 0; font-size: 1.05rem; font-weight: 400; color: #888; }
.branch-item.active { background: #111; color: #fff; }
.branch-item.active h3 { color: #fff; font-weight: 700; }
.detail-area { flex: 1; background: var(--hb-bg); padding: 30px; }
#naverMap { width: 100%; height: 400px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #ddd; }

/* 🏆 지점 안내 카드 및 버튼 색상 복구 */
.biz-card { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); text-align: left; }
.biz-card h2 { font-size: 2rem; color: #111; border-bottom: 2px solid var(--hb-gold); padding-bottom: 10px; margin-bottom: 20px; }
.info-row { display: flex; margin-bottom: 12px; font-size: 1.1rem; }
.info-lbl { width: 80px; font-weight: 700; color: #888; }
.btn-row { display: flex; gap: 10px; margin-top: 25px; flex-wrap: wrap; }

.btn { flex: 1; min-width: 120px; padding: 15px 5px; text-align: center; border-radius: 8px; font-weight: 700; font-size: 1.05rem; text-decoration: none; color: #fff; transition: 0.3s; display: inline-block; }
.btn-navy { background: #111; color: #fff; }
.btn-kakao { background: #FEE500; color: #3C1E1E !important; } /* 카카오 노란색 */
.btn-green { background: #03C75A; color: #fff !important; }  /* 네이버 초록색 */
.btn-gold { background: var(--hb-gold); color: #fff; }

/* 모바일 전용 스타일 */
@media (max-width: 768px) {
    .hero { height: 60vh; } 
    .hero h1 { font-size: 1.8rem; line-height: 1.4; word-break: keep-all; padding: 0 10px; }
    .hero .sub-text { font-size: 0.75rem; letter-spacing: 3px; margin-top: 15px; }
    
    .pc-hide { display: block; }
    .main-store { padding: 60px 20px; }
    .main-store h2 { font-size: 2rem; }
    .main-store p { font-size: 1.1rem; }
    .album-viewport { height: 450px; margin: 20px auto; }
    
    .finder-sec { flex-direction: column; min-height: auto; }
    .sidebar { width: 100%; }
    .branch-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 15px; }
    .branch-item { padding: 12px 5px; text-align: center; border: 1px solid #eee; border-radius: 8px; }
    .branch-item h3 { text-align: center; font-size: 0.9rem; }
    #naverMap { height: 300px; }
    .btn-row { display: grid; grid-template-columns: 1fr 1fr; }
}
    </style>

<body>

<section class="hero">
    <div class="hero-content">
        <div class="logo-area"><img src="assets/img/logo.png" alt="Logo"></div>
        <h1>대한민국 <b>한복의 기준</b></h1>
        <div class="sub-text">SINCE 2022, HANBEAM HERITAGE</div>
    </div>
</section>

<section class="video-sec">
    <video autoplay loop muted playsinline><source src="assets/video/brand_video.mp4" type="video/mp4"></video>
</section>

<section class="main-store">
    <div class="hq-slideshow" id="hqSlides">
        <img src="assets/img/hq_01.webp" class="active"><img src="assets/img/hq_02.webp"><img src="assets/img/hq_03.webp">
    </div>
    <h2>한빔한복의 편안한 전지점 매장</h2>
    <p>넓고 깨끗한 한빔한복의 매장에 <br class="pc-hide">부모님을 모시고 편하게 방문하세요!</p>
</section>

<section class="lookbook-sec">
    <h2 style="font-size:2.5rem; margin-bottom:10px;">2026 Lookbook</h2>
    <p id="lookbookGuide" style="color:var(--hb-gold); margin-bottom:20px;">옆으로 넘겨보세요</p>
    <div style="margin-bottom:30px;">
        <button class="tab-btn active" id="btnWed" onclick="changeTab('wedding', this)">웨딩 촬영</button>
        <button class="tab-btn" id="btnMot" onclick="changeTab('mother', this)">혼주 한복</button>
    </div>
    <div class="album-viewport" id="albumTarget"><div id="flipBook"></div></div>
</section>

<section class="finder-sec">
    <aside class="sidebar">
        <div class="sidebar-header"><h2>지점 안내</h2></div>
        <div class="branch-list" id="branchList"></div>
    </aside>
    <main class="detail-area" id="detailView">
        <div id="naverMap"></div>
        <div id="branchInfoBox"></div>
    </main>
</section>

<footer style="padding:40px 20px; background:#111; color:#444; text-align:center; font-size:0.8rem;">© 2026 HANBEAM HANBOK.</footer>

<script>
    /* 1. 매장 슬라이드 */
    let curS = 0; const sImgs = document.querySelectorAll('#hqSlides img');
    if(sImgs.length > 0) setInterval(() => { sImgs[curS].classList.remove('active'); curS = (curS + 1) % sImgs.length; sImgs[curS].classList.add('active'); }, 4000);

    /* 2. 룩북 암전 감지 */
    const lbSec = document.querySelector('.lookbook-sec');
    window.addEventListener('scroll', () => {
        const rect = lbSec.getBoundingClientRect();
        if (rect.top < window.innerHeight/2 && rect.bottom > window.innerHeight/2) {
            lbSec.classList.add('active-focus');
        } else {
            lbSec.classList.remove('active-focus');
        }
    });

    /* 3. 룩북 로직 (고정/무한루프/터치 해결) */
    const ALBUM_CONFIG = {
        wedding: { path: "assets/img/lookbook/wedding/wedding_", count: 5 },
        mother: { path: "assets/img/lookbook/mother/mother_", count: 6 }
    };

    let pFlip = null;
    function loadAlbum(cat) {
        const target = document.getElementById('albumTarget');
        const guide = document.getElementById('lookbookGuide');
        const isMobile = window.innerWidth <= 768;
        
        target.style.opacity = '1';
        guide.innerText = isMobile ? "터치해서 넘겨보세요" : "옆으로 넘겨보세요";

        if(pFlip) { pFlip.destroy(); pFlip = null; }
        target.innerHTML = '<div id="flipBook"></div>';
        
        const fb = document.getElementById('flipBook');
        const cfg = ALBUM_CONFIG[cat];
        
        const renderSet = () => {
            let s = '';
            for(let i=1; i <= cfg.count; i++) {
                let num = i < 10 ? '0' + i : i;
                s += `<div class="page" onclick="handlePageClick()"><img src="${cfg.path}${num}.webp"></div>`;
            }
            if(!isMobile && (cfg.count % 2 !== 0)) {
                s += `<div class="page" onclick="handlePageClick()"><img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"></div>`;
            }
            return s;
        };
        
        fb.innerHTML = renderSet() + renderSet() + renderSet();
        const baseCount = (!isMobile && (cfg.count % 2 !== 0)) ? cfg.count + 1 : cfg.count;

        pFlip = new St.PageFlip(fb, { 
            width: isMobile ? 320 : 850, height: isMobile ? 450 : 850, 
            showCover: false, usePortrait: isMobile, drawShadow: true, flippingTime: 800,
            startPage: baseCount, clickEventForward: isMobile, swipeDistance: 30, showPageCorners: false, mobileScrollSupport: true
        });
        pFlip.loadFromHTML(document.querySelectorAll('.page'));
        
        pFlip.on('flip', (e) => {
            const total = baseCount * 3;
            if (e.data >= total - (isMobile ? 1 : 2)) {
                setTimeout(() => { pFlip.turnToPage(baseCount); }, 100);
            }
            if (e.data < 1) {
                setTimeout(() => { pFlip.turnToPage(baseCount); }, 100);
            }
        });
    }
    function handlePageClick() { if(pFlip) pFlip.flipNext(); }

    window.onload = () => { loadAlbum('wedding'); };
    window.onresize = () => { loadAlbum(document.getElementById('btnWed').classList.contains('active') ? 'wedding' : 'mother'); };
    /* 버튼 색상 변경 + 앨범 로드 합치기 */
function changeTab(cat, btn) {
    // 1. 모든 버튼에서 'active' 클래스 제거
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    // 2. 현재 누른 버튼에 'active' 클래스 추가
    btn.classList.add('active');
    // 3. 기존에 있던 로직 실행
    loadAlbum(cat);
}
</script>

<script src="map-logic.js"></script>
</body>
