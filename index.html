<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>한빔한복 공식 홈페이지 - 전국 11개 지점 네트워크</title>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">

<style>
    :root { 
        --hb-navy: #0A1D37; /* Control Tower Navy */
        --hb-gold: #B8977E;  /* Champagne Gold */
        --hb-bg: #F9F7F5;   /* Traditional Paper Background */
        --hb-text: #333;
    }
    
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body { margin: 0; font-family: 'Pretendard', sans-serif; color: var(--hb-text); background: #fff; line-height: 1.6; overflow-x: hidden; }
    h1, h2, h3 { margin: 0; font-weight: 700; }
    a { text-decoration: none; color: inherit; cursor: pointer; transition: 0.3s; }

    /* ===== 1. Cali Hero Section (Cali Hero - NEW) ===== */
    .hero { 
        height: 100vh; background: var(--hb-navy); 
        display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        position: relative; overflow: hidden; color: #fff;
    }
    
    /* 가상의 캘리그라피 이미지 엑박 방지 처리 */
    .hero-calli { 
        max-width: 400px; height: 150px; border: 2px dashed rgba(255,255,255,0.2); 
        display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.4); 
        font-size: 1.2rem; margin-bottom: 25px; border-radius: 8px;
    }
    
    .hero .logo-top { font-size: 1.1rem; letter-spacing: 0.5em; margin-bottom: 20px; opacity: 0.8; text-transform: uppercase; }
    /* Cali Hero (Title 정정) */
    .hero h1 { font-size: clamp(2.5rem, 6vw, 4rem); margin: 0; font-weight: 300; letter-spacing: -0.02em; }
    .hero h1 b { font-weight: 700; color: var(--hb-gold); }
    .hero .sub-text { margin-top: 25px; font-size: 1.2rem; opacity: 0.7; max-width: 700px; }
    
    .scroll-hint { 
        position: absolute; bottom: 40px; animation: bounce 2s infinite; 
        font-size: 0.85rem; opacity: 0.5; letter-spacing: 2px;
    }
    @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }

    /* ===== 2. Video Section ===== */
    .video-sec { height: 75vh; background: #000; display: flex; justify-content: center; align-items: center; color: rgba(255,255,255,0.2); font-size: 1.5rem; }

    /* ===== 3. Main Store (HQ - 부산점) ===== */
    .main-store { padding: 120px 20px; background: var(--hb-bg); text-align: center; }
    .hq-photo { max-width: 1000px; margin: 0 auto 50px; height: 500px; background: #ddd; border-radius: 4px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; color: #999; }
    .main-store h2 { font-size: 2.5rem; color: var(--hb-navy); margin-bottom: 20px; }
    .main-store p { max-width: 700px; margin: 0 auto; color: #666; font-size: 1.1rem; }

    /* ===== 4. 3D Lookbook Section (Wide) ===== */
    .lookbook-sec { padding: 100px 0; background: #fff; text-align: center; }
    .tab-group { display: flex; justify-content: center; gap: 15px; margin: 40px 0; }
    .tab-btn { padding: 12px 35px; border: 1px solid var(--hb-gold); background: transparent; color: var(--hb-gold); cursor: pointer; font-weight: 700; border-radius: 50px; }
    .tab-btn.active { background: var(--hb-gold); color: #fff; }
    .album-viewport { margin: 0 auto; width: 90vw; max-width: 1100px; height: 800px; display: flex; justify-content: center; align-items: center; }
    .page { background: #fff; border: 1px solid #eee; overflow: hidden; }
    .page-cover { background: var(--hb-navy); color: #fff; display: flex; flex-direction: column; justify-content: center; padding: 40px; height: 100%; }

    /* ===== 5. Store Finder (Slim & Aligned - IMPROVED) ===== */
    .finder-sec { display: flex; height: 85vh; border-top: 1px solid #eee; }
    
    /* 왼쪽 사이드바: Slim List */
    .sidebar { width: 300px; background: #fff; border-right: 1px solid #eee; display: flex; flex-direction: column; }
    .sidebar-header { padding: 50px 30px 20px; text-align: right; }
    .sidebar-header h2 { font-size: 1.8rem; color: var(--hb-navy); margin: 0; font-weight: 700; }

    .branch-list { flex: 1; overflow-y: auto; padding-right: 15px; }
    .branch-item { 
        padding: 20px 30px; cursor: pointer; border-bottom: 1px solid #f2f2f2;
        transition: all 0.3s;
        text-align: right; /* 오른쪽 정렬 */
    }
    .branch-item:hover { background: var(--hb-bg); }
    .branch-item.active { 
        background: var(--hb-navy); color: #fff; 
        border-radius: 0 50px 50px 0; /* 둥근 우측 정렬 느낌 */
        margin-right: -15px; /* 사이드바 경계에 붙이기 */
        padding-right: 45px; /* 액티브 강조 */
    }
    .branch-item h3 { margin: 0; font-size: 1.1rem; }
    /* 주소 삭제 */

    /* 오른쪽: Slim 상세 내용 (No Scroll - IMPROVED) */
    .detail-content { flex: 1; background: var(--hb-bg); padding: 50px; overflow-y: auto; display: flex; flex-direction: column; justify-content: space-between; }
    .detail-view { max-width: 900px; margin: 0 auto; animation: fadeIn 0.5s; width: 100%; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* 지도 영역 높이 줄이기 */
    .map-container { 
        width: 100%; height: 300px; background: #eee; border-radius: 8px; margin-bottom: 25px;
        position: relative; overflow: hidden;
        border: 1px solid #e0e0e0; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }
    .map-pin { position: absolute; top: 50%; left: 50%; width: 18px; height: 18px; background: var(--hb-gold); border-radius: 50%; border: 3px solid #fff; animation: pulse 1.5s infinite; transform: translate(-50%, -50%); }
    @keyframes pulse { 0% {transform:translate(-50%,-50%) scale(1); opacity:1;} 100% {transform:translate(-50%,-50%) scale(2); opacity:0;} }

    /* 상세 안내 여백 줄이기 */
    .biz-card { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); margin-bottom: 25px; }
    .biz-card h3 { font-size: 1.8rem; color: var(--hb-navy); margin-bottom: 15px; border-bottom: 2px solid var(--hb-gold); padding-bottom: 10px; }
    .info-row { display: flex; margin-bottom: 8px; font-size: 0.95rem; color: #555; }
    .info-lbl { width: 90px; font-weight: 700; color: #333; }

    /* 버튼 일렬 배치 (No Scroll - NEW) */
    .btn-grid-row { display: flex; gap: 10px; width: 100%; justify-content: center; }
    .btn { flex: 1; padding: 15px; text-align: center; border-radius: 6px; font-weight: 700; text-decoration: none; transition: 0.3s; font-size: 0.9rem; white-space: nowrap; }
    .btn-navy { background: var(--hb-navy); color: #fff; }
    .btn-kakao { background: #FEE500; color: #3C1E1E; }
    .btn-green { background: #03C75A; color: #fff; }
    .btn-gold { background: var(--hb-gold); color: #fff; }
    .btn:hover { opacity: 0.9; transform: translateY(-3px); }

    /* ===== Footer (Simple) ===== */
    .footer { padding: 60px 20px; background: #111; color: rgba(255,255,255,0.4); text-align: center; font-size: 0.8rem; letter-spacing: 1px; }

    /* ===== Mobile Responsive (Updated) ===== */
    @media (max-width: 1000px) {
        .store-finder { flex-direction: column; height: auto; }
        .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #eee; }
        .sidebar-header { padding: 30px 20px; text-align: center; }
        
        .branch-list { 
            display: flex; overflow-x: auto; white-space: nowrap; padding: 0 10px 15px;
            scroll-snap-type: x mandatory;
        }
        .branch-item { 
            padding: 10px 20px; border-bottom: none; border-right: 1px solid #eee;
            text-align: center; scroll-snap-align: start; flex: 0 0 auto;
        }
        .branch-item.active { 
            border-radius: 20px; margin-right: 10px; padding: 10px 20px;
            border: 2px solid var(--hb-gold);
        }
        
        .detail-content { padding: 40px 20px 60px; height: auto; }
        .detail-title { font-size: 2rem; }
        .map-container { height: 250px; }
        .detail-info { grid-template-columns: 1fr; gap: 20px; }
        .btn-grid-row { flex-direction: column; gap: 10px; }
        .btn { width: 100%; }
    }
</style>
</head>
<body>

<section class="hero">
    <div class="logo-top">HANBEAM HANBOK</div>
    
    <div class="hero-calli">
        [ 한빔한복 캘리그라피 이미지 ]
    </div>
    
    <h1>대한민국 <b>한복의 기준</b></h1>
    <div class="sub-text">SINCE 1994, HANBEAM HERITAGE</div>
    <div class="scroll-hint">EXPLORE</div>
</section>

<section class="video-sec">[ BRAND FILM AREA ]</section>

<section class="main-store">
    <div class="hq-photo">[ 한빔한복 부산점 전경 고화질 사진 ]</div>
    <h2>한빔한복 부산점</h2>
    <p>30년 장인의 숨결로 짓는 단 하나의 예복, 한빔의 기술력과 디자인이 탄생하는 곳입니다.</p>
</section>

<section class="lookbook-sec">
    <h2>2026 Lookbook</h2>
    <div class="tab-group">
        <button class="tab-btn active">웨딩 촬영</button>
        <button class="tab-btn">혼주 한복</button>
    </div>
    <div class="album-viewport"><div id="flipBook"></div></div>
</section>

<section class="store-finder" id="finder">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>지점 가이드</h2>
        </div>
        <div class="branch-list" id="branchList">
            </div>
    </aside>

    <main class="detail-content">
        <div id="detailView" class="detail-view">
            </div>
    </main>
</section>

<footer class="footer">
    © 2026 HANBEAM HANBOK. DESIGNED FOR EXCELLENCE.
</footer>

<script>
    const branches = [
        {id:0, name:"부산점", addr:"부산 동구 조방로 123 한빔빌딩", tag:"HEADQUARTER", desc:"한빔한복의 심장부. 전 지점의 디자인과 품질을 총괄하는 플래그십 매장입니다.", res:"https://m.booking.naver.com/booking/6/bizes/661812", kakao:"https://open.kakao.com/o/soq7Ns4d"},
        {id:1, name:"인천점", addr:"인천 남동구 인하로 123", tag:"SEOUL/INCHEON", desc:"수도권 고객님들을 위한 세련된 감각의 매장. 넓은 피팅 공간을 자랑합니다.", res:"https://m.booking.naver.com/booking/13/bizes/1039475", kakao:"https://open.kakao.com/o/sIrXajUf"},
        {id:2, name:"안산점", addr:"경기 안산시 단원구 고잔동 567", tag:"GYEONGGI", desc:"안산 지역의 대표적인 예복 전문점. 맞춤 상담에 특화된 장인이 상주합니다.", res:"https://m.booking.naver.com/booking/6/bizes/1500008", kakao:"https://open.kakao.com/o/sqRSjaRh"},
        {id:3, name:"대구점", addr:"대구 중구 달구벌대로 789", tag:"DAEGU", desc:"대구 중심에서 만나는 한빔의 감각. 고급스러운 인테리어와 상담 서비스를 제공합니다.", res:"https://m.place.naver.com/place/2043617700/ticket", kakao:"https://open.kakao.com/o/sqPdeNfi"},
        {id:4, name:"창원점", addr:"경남 창원시 성산구 상남로 12", tag:"GYEONGNAM", desc:"창원 신랑신부님들이 가장 선호하는 매장. 트렌디한 한복 라인업을 보유하고 있습니다.", res:"https://booking.naver.com/booking/6/bizes/843111", kakao:"https://open.kakao.com/o/sdcvbh5e"}
        // ... 나머지 지점 추가 가능
    ];

    let activeId = 0;

    function render() {
        // 리스트 업데이트 (Slim List - IMPROVED)
        const listEl = document.getElementById('branchList');
        listEl.innerHTML = branches.map(b => `
            <div class="branch-item ${b.id === activeId ? 'active' : ''}" onclick="selectBranch(${b.id})">
                <h3>${b.name}</h3>
                </div>
        `).join('');

        // 상세페이지 업데이트 (Slim 상세 - IMPROVED)
        const b = branches.find(item => item.id === activeId);
        document.getElementById('detailView').innerHTML = `
            <div class="map-container">
                <div class="map-placeholder" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#bbb;">[ Naver Map API 연동 영역 ]</div>
                <div class="map-pin"></div> </div>

            <div class="biz-card">
                <h3>한빔한복 ${b.name} 정보</h3>
                <div class="info-row"><span class="info-lbl">위치 안내</span><span>${b.addr}</span></div>
                <div class="info-row"><span class="info-lbl">지점 스토리</span><span>${b.desc}</span></div>
            </div>
            
            <div class="btn-grid-row">
                <a href="${b.res}" target="_blank" class="btn btn-navy">네이버 실시간 예약</a>
                <a href="${b.kakao}" target="_blank" class="btn btn-kakao">카카오톡 1:1 상담</a>
                <a href="#" class="btn btn-green">지점 위치 공유</a>
                <a href="#" class="btn btn-gold">지점 정보 공유</a>
            </div>
        `;
    }

    function selectBranch(id) { activeId = id; render(); }
    window.onload = () => { /* 룩북 함수 삭제 */ render(); };
</script>

</body>
</html>
